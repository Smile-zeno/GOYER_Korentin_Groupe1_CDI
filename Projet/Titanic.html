            </ul>

                <p class="closeIcon">fermer</p>
            </button>
        </article>
    </header>
    <main>
        <article class="presentation-page">
            <div name="ImageTitanic" style="width: 50%;height: auto;"></div>
            <div class="texte_presentation" style="width: 50%;height: auto;">
                <div id="TitreTitanic" ></div>
                <div class="check">
                    <input type="checkbox"><label>J'ai vu ce film</label><br>
                </div>
                <div id="TexteTitanic"></div>
                <div>
                    <h3 class="Pitch-Fiche">Fiche technique</h3>
                    <p class="texte_fiche">Réalisateur:<br>James Cameron<br>Acteur:<br>Leonardo DiCaprio, Kate Winslet, Billy Zane, Kathy Bates, Frances Fisher, Gloria Stuart, Bill Paxton, Bernard Hill<br>Compositeur:<br>James Horner</p>
                </div>
            </div>
        </article>
        <!-- Model 3D -->
        <model-viewer src="image/3D object/scene_medievale.glb" ar ar-modes="webxr scene-viewer quick-look" camera-controls tone-mapping="neutral" poster="image/3D object/poster.webp" shadow-intensity="1"></model-viewer>
    </main>
    <footer>
        <!--article pour diviser footer en plusieurs parties-->
        <article class="presentation-footer">
            <div class="contacter">
                <p>Nous contacter : <a href="https://youtu.be/FtE6SV_1wu4?list=RDFtE6SV_1wu4">on a pas de lien</a></p>
            </div>
            <div class="reseaux">
                <p>Nos réseaux : <a href="https://youtu.be/dQw4w9WgXcQ?list=RDdQw4w9WgXcQ">on a toujours pas de lien</a></p>
            </div>
        </article>
    </footer>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <script src="Javascript/main.js"></script>
    <!-- API the movie data base -->
    <script type="text/javascript"><!-- Information pour Titanic -->
        function fetchTitanic() {
            return fetch(
                'https://api.themoviedb.org/3/movie/597?api_key=b408120da29830089d811abdd668f258&language=fr-FR'
            ).then((response) => response.json())
        }
        async function displayTitanic() {
            const data = await fetchTitanic();
            var list = document.getElementsByName("ImageTitanic")
            list.forEach(Image => {
                Image.innerHTML = `
            <img src="https://image.tmdb.org/t/p/w500${data.poster_path}" alt="${data.title}" class="image" style="width: 85%; height: auto;"/>
            `
            });
            document.getElementById("TitreTitanic").innerHTML = `<h1>${data.title}</h1>`
            document.getElementById("TexteTitanic").innerHTML = `<h3 class="Pitch-Fiche">Pitch</h3>
            <p>${data.overview}</p>`
        }
    displayTitanic();
    </script>
