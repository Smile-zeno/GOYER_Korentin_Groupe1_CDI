            <div class="logo">
                <a href="index.html"><img class="logo-img" src="image/clapperboard.png" alt="logo" style="height: 100%;"></a>
            </div>
            <div class="nom">
                <h1>
                    Filmographe
                </h1>
            </div><!-- Menu hamburger -->
            <ul class="menu">
                <li class="menuItem">
                    <a class="menuItem" href="index.html"><img class="logo-img" src="image/clapperboard.png" alt="logo" style="height: 100%;"></a>
                    <label for="menuItem">Page d'accueil</label>
                </li>
                <li class="menuItem">
                    <a class="menuItem" href="Formulaire.html"><img class="logo-img" src="image/connexion.png" alt="Connexion" style="height: 100%;"></a>

                    <button class="darkMode" onclick="toggleTheme()">Dark Mode</button>

                    <a href="Php/CRUD/index.php">

                </li>
            </ul>

                <p class="menuIcon">Menu</p>
                <p class="closeIcon">fermer</p>
            </button>
        </article>
    </header>
    <!-- Formulaire -->
    <main>
        <div class="message-error">
            <ul class="error-list"></ul>
        </div>
        <div class="message-success">
            Formulaire envoyé !
        </div>
        <form action="" method="POST" enctype="multipart/form-data">
            <div>
                <label for="pseudo">Pseudo</label>
                <input type="text" name="pseudo" id="pseudo">
            </div>

            <div>
                <label for="email">Email</label>
                <input type="email" name="email" id="email">
            </div>

            <div>
                <label for="password">Mot de passe</label>
                <input type="password" name="password" id="password">
            </div>

            <div>
                <label for="password2">Entrer à nouveau le mot de passe</label>
                <input type="password" name="password2" id="password2">
            </div>

            <h5>Type de film que vous préférez :</h5>
            <div class="choixFilm">
                <input type="checkbox" name="type-movie" id="scifi">
                <label for="scifi">Science Fiction</label>
            </div>
            <div class="choixFilm">
                <input type="checkbox" name="type-movie" id="documentaire">
                <label for="documentaire">Documentaire</label>
            </div>
            <div class="choixFilm">
                <input type="checkbox" name="type-movie" id="anime">
                <label for="anime">Animé</label>
            </div>

            <button class="inscrire" type="submit">S'inscrire</button>
        </form>
    </main>
    <footer>
        <!--article pour diviser footer en plusieurs parties-->
        <article class="presentation-footer">
            <div class="contacter">
                <p>Nous contacter : <a href="https://youtu.be/FtE6SV_1wu4?list=RDFtE6SV_1wu4">on a pas de lien</a></p>
            </div>
            <div class="reseaux">
                <p>Nos réseaux : <a href="https://youtu.be/dQw4w9WgXcQ?list=RDdQw4w9WgXcQ">on a toujours pas de lien</a></p>
            </div>
        </article>
    </footer>
</body>
